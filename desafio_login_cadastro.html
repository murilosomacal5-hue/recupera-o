<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Cadastro</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f13;
      --surface:   #18181f;
      --border:    #2a2a38;
      --accent:    #f7df1e;
      --accent2:   #3ecf8e;
      --danger:    #ff5b5b;
      --text:      #e8e8f0;
      --muted:     #6b6b80;
      --input-bg:  #12121a;
      --radius:    10px;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(247,223,30,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 90%, rgba(62,207,142,0.05) 0%, transparent 70%);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 16px;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      position: relative;
    }

    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform 0.25s ease;
    }

    .tab-btn.active {
      color: var(--accent);
    }

    .tab-btn.active::after {
      transform: scaleX(1);
    }

    .tab-btn:hover:not(.active) {
      color: var(--text);
      background: rgba(255,255,255,0.03);
    }

    .form-wrap {
      padding: 32px 28px 28px;
    }

    .form-panel {
      display: none;
    }
    .form-panel.active {
      display: block;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-title {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .form-title span {
      color: var(--accent);
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.92rem;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder {
      color: #3d3d50;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(247,223,30,0.1);
    }

    input.erro {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(255,91,91,0.12);
    }

    input.sucesso {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(62,207,142,0.1);
    }

    .campo-erro {
      font-size: 0.73rem;
      color: var(--danger);
      margin-top: 5px;
      min-height: 16px;
      /* alunos usarão textContent para preencher */
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #0f0f13;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 13px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-primary:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .feedback {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 0.84rem;
      font-weight: 500;
      display: none; /* alunos farão display: block via JS */
    }

    .feedback.erro {
      background: rgba(255,91,91,0.1);
      border: 1px solid rgba(255,91,91,0.3);
      color: var(--danger);
    }

    .feedback.sucesso {
      background: rgba(62,207,142,0.1);
      border: 1px solid rgba(62,207,142,0.3);
      color: var(--accent2);
    }

    .switch-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .switch-link button {
      background: none;
      border: none;
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      padding: 0;
    }

    .switch-link button:hover {
      color: #fff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(247,223,30,0.08);
      border: 1px solid rgba(247,223,30,0.2);
      border-radius: 99px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      padding: 4px 10px;
      margin-bottom: 32px;
    }

    .badge::before {
      content: '⚡';
      font-size: 0.7rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

  <div class="card">

    <nav class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="mostrarAba('login')">
        Login
      </button>
      <button class="tab-btn" id="tab-cadastro" onclick="mostrarAba('cadastro')">
        Cadastro
      </button>
    </nav>

    <div class="form-wrap">
      <div class="badge">Desafio JavaScript</div>

      <div id="painel-login" class="form-panel active">

        <p class="form-title">// acesse sua <span>conta</span></p>

        <form id="form-login" novalidate>

          <div class="field">
            <label for="login-usuario">Usuário</label>
            <input
              type="text"
              id="login-usuario"
              placeholder="Digite seu usuário"
              autocomplete="username"
            >
            <div class="campo-erro" id="erro-login-usuario"></div>
          </div>

          <div class="field">
            <label for="login-senha">Senha</label>
            <input
              type="password"
              id="login-senha"
              placeholder="Digite sua senha"
              autocomplete="current-password"
            >
            <div class="campo-erro" id="erro-login-senha"></div>
          </div>

          <button type="submit" class="btn-primary">Entrar</button>

          <div class="feedback" id="feedback-login"></div>

        </form>

        <div class="switch-link">
          Não tem conta?
          <button onclick="mostrarAba('cadastro')">Criar conta</button>
        </div>

      </div>


      <div id="painel-cadastro" class="form-panel">

        <p class="form-title">// crie sua <span>conta</span></p>

        <form id="form-cadastro" novalidate>

          <div class="field">
            <label for="cad-email">E-mail</label>
            <input
              type="email"
              id="cad-email"
              placeholder="usuario@email.com"
              autocomplete="email"
            >
            <div class="campo-erro" id="erro-cad-email"></div>
          </div>

          <div class="field">
            <label for="cad-senha">Senha</label>
            <input
              type="password"
              id="cad-senha"
              placeholder="Mínimo 6 caracteres"
              autocomplete="new-password"
            >
            <div class="campo-erro" id="erro-cad-senha"></div>
          </div>

          <div class="field">
            <label for="cad-cpf">CPF</label>
            <input
              type="text"
              id="cad-cpf"
              placeholder="000.000.000-00"
              maxlength="14"
            >
            <div class="campo-erro" id="erro-cad-cpf"></div>
          </div>

          <div class="field">
            <label for="cad-nascimento">Data de Nascimento</label>
            <input
              type="date"
              id="cad-nascimento"
            >
            <div class="campo-erro" id="erro-cad-nascimento"></div>
          </div>

          <button type="submit" class="btn-primary">Criar conta</button>

          <div class="feedback" id="feedback-cadastro"></div>

        </form>

        <div class="switch-link">
          Já tem conta?
          <button onclick="mostrarAba('login')">Fazer login</button>
        </div>

      </div>

    </div>
  </div>
  <script>
    /* ──────────────────────────────────────────────────
       FUNÇÃO DE TROCA DE ABAS (já implementada)
       Os alunos NÃO precisam alterar esta função.
    ────────────────────────────────────────────────── */
    function mostrarAba(aba) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + aba).classList.add('active');
      document.getElementById('painel-' + aba).classList.add('active');
    }

</body>
</html>
